<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teams — Johar Clash</title>
<meta name="description" content="Browse Johar Clash teams and squads, see who has open slots, and find a group to join.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#F1EDE1;--bone:#E7E1D2;--ink:#141414;--red:#E8442A;--blue:#1E46C8;--mute:#6d6a60;--hair:#cfc8b6}
body{background:var(--paper);color:var(--ink);font:16px/1.55 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
a{color:inherit}.mono{font-family:'DM Mono',ui-monospace,monospace}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
.topbar{border-bottom:1px solid var(--ink);position:sticky;top:0;background:var(--paper);z-index:20}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:56px;gap:16px}
.brand{font-weight:800;letter-spacing:-.03em;text-decoration:none}.brand b{color:var(--red)}
.navlinks{display:flex;gap:6px;flex-wrap:wrap}
.navlinks a{font:500 11px/1 'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;text-decoration:none;border:1px solid var(--ink);padding:9px 11px}
.navlinks a:hover,.navlinks a.on{background:var(--ink);color:var(--paper)}
header.head{padding:44px 0 22px;border-bottom:1px solid var(--ink)}
.kick{font:500 11px/1 'DM Mono',monospace;text-transform:uppercase;letter-spacing:.14em;color:var(--red)}
h1{font-size:clamp(30px,5vw,54px);font-weight:800;letter-spacing:-.04em;line-height:.95;margin:8px 0}
.lead{color:#333;max-width:60ch}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:20px 0;border-bottom:1px solid var(--ink)}
.filters input{background:#fff;border:1px solid var(--ink);padding:11px 13px;font:14px 'Inter';min-width:220px}
.chip{font:500 11px/1 'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;border:1px solid var(--ink);padding:9px 12px;cursor:pointer;background:#fff}
.chip.on{background:var(--blue);border-color:var(--blue);color:var(--paper)}
.count{margin-left:auto;font:500 11px/1 'DM Mono',monospace;color:var(--mute);text-transform:uppercase;letter-spacing:.08em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:16px;padding:26px 0 90px}
.card{border:1px solid var(--ink);background:#fff;text-decoration:none;display:block;padding:20px;transition:.15s}
.card:hover{transform:translateY(-3px);box-shadow:6px 6px 0 var(--ink)}
.thead{display:flex;gap:13px;align-items:center}
.tav{width:44px;height:44px;border:1px solid var(--ink);background:var(--bone);display:flex;align-items:center;justify-content:center;font:800 18px/1 'Inter';color:var(--mute);flex:0 0 auto}
.nm{font-size:24px;font-weight:800;letter-spacing:-.03em;line-height:1}
.ev{font:500 10px/1.4 'DM Mono',monospace;color:var(--red);text-transform:uppercase;margin-top:6px}
.tl{font-size:13.5px;color:#333;margin:12px 0}
.tag{font:500 9px/1 'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;background:var(--ink);color:var(--paper);padding:6px 8px;margin:0 6px 6px 0;display:inline-block}
.tag.open{background:var(--blue)}
.empty{padding:60px 0;text-align:center;color:var(--mute)}.empty a{color:var(--blue);font-weight:600}
footer{border-top:1px solid var(--ink);padding:24px 0;font:500 11px/1.6 'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--mute)}
</style>
</head>
<body>
<div class="topbar"><div class="wrap">
<a class="brand" href="./">JOHAR<b>/</b>CLASH</a>
<div class="navlinks">
<a href="portal.html">Portal</a>
<a href="players.html">Players</a>
<a href="teams.html" class="on">Teams</a>
<a href="./#register">Register</a>
</div>
</div></div>

<header class="head"><div class="wrap">
<div class="kick">Squads & groups</div>
<h1>Teams.</h1>
<p class="lead">Teams competing at Johar Clash. Filter to the ones with open slots and reach out to join.</p>
</div></header>

<div class="wrap">
<div class="filters">
<input type="text" id="q" placeholder="Search team, game or event…">
<span class="chip" id="openChip">Open slots only</span>
<span class="count" id="count"></span>
</div>
<div class="grid" id="grid"></div>
</div>

<footer><div class="wrap">Johar Clash · start a team in the <a href="portal.html" style="color:var(--blue)">portal</a></div></footer>

<script>
var $=function(s){return document.querySelector(s)};
var data=[], openOnly=false, q="";
var GAMES=["FIFA","Tekken 5","Valorant","Call of Duty","Mortal Kombat","PUBG Mobile"], gameF={};
function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}
$("#openChip").onclick=function(){openOnly=!openOnly;this.classList.toggle("on");render()};
(function(){var cnt=$("#count");GAMES.forEach(function(g){var c=document.createElement("span");c.className="chip";c.textContent=g;c.onclick=function(){gameF[g]=!gameF[g];this.classList.toggle("on");render()};cnt.parentNode.insertBefore(c,cnt)})})();
$("#q").oninput=function(){q=this.value.toLowerCase();render()};
function card(t){
  var tags="";
  if(t.event)tags+='<span class="tag">'+esc(t.event)+'</span>';
  if(t.game)tags+='<span class="tag">'+esc(t.game)+'</span>';
  if(t.openSlots>0)tags+='<span class="tag open">'+t.openSlots+' open slot'+(t.openSlots>1?'s':'')+'</span>';
  return '<a class="card" href="g/'+esc(t.slug)+'/">'+
    '<div class="thead"><div class="tav">'+esc((t.name||'?')[0].toUpperCase())+'</div><div>'+
    '<div class="nm">'+esc(t.name)+'</div>'+
    (t.event?'<div class="ev">'+esc(t.event)+'</div>':'')+
    '</div></div>'+
    (t.tagline?'<div class="tl">'+esc(t.tagline)+'</div>':'<div class="tl" style="color:#aaa">—</div>')+
    '<div>'+tags+'</div>'+
    ((t.members&&t.members.length)?'<div class="tl mono" style="font-size:11px;color:var(--mute)">'+t.members.length+' member'+(t.members.length>1?'s':'')+'</div>':'')+
    '</a>';
}
function render(){
  var af=GAMES.filter(function(g){return gameF[g]});
  var list=data.filter(function(t){
    if(af.length&&af.indexOf(t.game)<0)return false;
    if(openOnly&&!(t.openSlots>0))return false;
    if(q&&!((t.name||"")+" "+(t.game||"")+" "+(t.event||"")).toLowerCase().includes(q))return false;
    return true;
  });
  $("#count").textContent=list.length+" / "+data.length+" teams";
  $("#grid").innerHTML=list.length?list.map(card).join(""):
    '<div class="empty">No teams yet. <a href="portal.html">Create the first one ↗</a></div>';
}
fetch("data/teams.json?c="+Date.now()).then(function(r){return r.ok?r.json():[]}).then(function(d){
  data=(d||[]).sort(function(a,b){return (b.updated||"").localeCompare(a.updated||"")});render();
}).catch(function(){data=[];render();});
</script>
</body>
</html>
